<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙泉青瓷数字遗产交互系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script src="https://unpkg.com/@mediapipe/hands/hands.js"></script>
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body { margin: 0; background: #000406; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .ui-interact { pointer-events: auto; }
        #sidebar { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; }
        .ok-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: #00ffcc; width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body onclick="handleFirstInteraction()">
    <audio id="bgm" loop><source src="Among the Stars.mp3" type="audio/mpeg"></audio>

    <div id="canvas-container"></div>

    <div class="fixed inset-0 pointer-events-none z-20 p-8 flex flex-col justify-between">
        <header>
            <div class="w-12 h-0.5 bg-yellow-500 mb-4"></div>
            <h1 class="text-2xl font-extralight tracking-[0.5em] mb-2">LONGQUAN QC</h1>
            <p class="text-xs text-white/40 tracking-widest">窑火炼千载，一色出天青</p>
        </header>

        <footer class="flex justify-between items-end">
            <div class="glass-panel p-4 rounded-xl w-48 border-l-2 border-l-cyan-500 relative overflow-hidden">
                <div class="flex items-center gap-3">
                    <div id="vision-dot" class="w-2 h-2 rounded-full bg-red-600"></div>
                    <div>
                        <div class="text-[8px] text-white/40 uppercase">AI Tracking</div>
                        <div id="gesture-name" class="text-xs text-cyan-400">正在连接摄像头...</div>
                    </div>
                </div>
                <div id="ok-bar" class="ok-progress"></div>
            </div>
            <div id="asset-name" class="text-sm font-light tracking-widest text-white/80">星云待机模式</div>
        </footer>
    </div>

    <button onclick="toggleSidebar(true)" class="ui-interact fixed left-6 top-1/2 -translate-y-1/2 z-40 p-4">
        <div class="space-y-1.5">
            <div class="w-1.5 h-1.5 rounded-full bg-cyan-500"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-cyan-500"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-cyan-500"></div>
        </div>
    </button>

    <div id="sidebar" class="fixed left-0 top-0 h-full w-80 glass-panel border-r border-white/10 -translate-x-full flex flex-col p-10">
        <div class="flex justify-between items-center mb-10">
            <span class="text-xs tracking-[0.3em] text-white/60">ARCHIVES / 档案库</span>
            <button onclick="toggleSidebar(false)" class="ui-interact text-cyan-400 text-xs">CLOSE</button>
        </div>
        <div id="model-list" class="ui-interact flex-1 overflow-y-auto space-y-3"></div>
    </div>

    <div id="info-panel" class="fixed right-10 top-1/2 -translate-y-1/2 w-72 glass-panel p-6 rounded-3xl opacity-0 transition-all duration-700 translate-x-10 z-30">
        <h3 id="panel-title" class="text-lg font-light mb-4 border-b border-white/10 pb-2"></h3>
        <p id="panel-desc" class="text-[10px] leading-relaxed text-white/60 text-justify"></p>
    </div>

    <div class="fixed bottom-8 left-8 w-40 h-28 glass-panel rounded-xl overflow-hidden z-40">
        <video id="input_video" class="absolute inset-0 w-full h-full object-cover opacity-30" playsinline></video>
    </div>

    <script>
        const config = { count: 80000 }; // 稍微调低粒子数以保证 GitHub 运行流畅
        let scene, camera, renderer, points;
        let targetPositions = new Float32Array(config.count * 3);
        let targetColors = new Float32Array(config.count * 3);
        let models = [], activeModelIndex = -1;
        let currentRotationY = 0;
        let audioStarted = false, okGestureStartTime = null;

        const artifactDescriptions = {
            '龙泉窑舟形砚滴': '这是一件极具文人情趣的文房珍玩。整器巧妙化作一叶扁舟，舟上人物神态生动。釉质紧致，色泽淡雅。作为盛水注墨之器，它不仅体现了宋元时期陶瓷工艺的精湛，更承载了古代士大夫阶层的审美风骨。',
            '青釉小瓷马': '这件瓷马形态健硕，四足有力，将马的昂扬姿态表现得淋漓尽致。釉色清亮，完美贴合雕塑线条。它虽体积微小，却展现了龙泉窑工匠在微型造像上的卓越功底，是难得一见的动物题材杰作。',
            '龙泉窑青釉鸡首壶': '此壶集实用与审美于一体，鸡首昂扬，象征着黎明与吉祥。釉色呈现典型的梅子青感，温润莹泽。其造型流线流畅，展现了龙泉窑早期对自然形态的精妙捕捉与釉料烧制的极高水准。',
            '青釉双鱼耳瓶': '瓶侧双鱼形耳栩栩如生，寓意“年年有余”。釉面清亮剔透，色泽青翠欲滴。器型比例匀称，瓶颈修长，鱼耳的点缀打破了器物的沉静，增添了一抹灵动之气，是龙泉青瓷中的经典制式。',
            '元代高足杯': '杯体挺拔，杯脚纤细稳重。釉色均匀，色调稳重。作为元代流行的酒具，它融合了游牧文化的豪放与江南瓷文化的精致。杯口微撇，触感细腻，反映了元代龙泉窑远销海内外的繁荣景象。',
            '南宋青釉香炉': '此炉造型端庄肃穆，模仿青铜礼器。釉面肥厚，开片错落有致，色泽如碧玉般深沉。烟雾从炉中袅袅升起，与青翠的釉色相得益彰，是南宋龙泉窑追求“绚烂之极归于平淡”审美理想的巅峰之作。'
        };

        function initApp() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 150;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(config.count * 3), 3));
            geo.setAttribute('color', new THREE.BufferAttribute(new Float32Array(config.count * 3), 3));

            const mat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
            points = new THREE.Points(geo, mat);
            scene.add(points);
            
            setNebulaMode();
            loadFixedArchives();
            animate();
        }

        function loadFixedArchives() {
            const gltfLoader = new THREE.GLTFLoader();
            const targets = [
                { name: '龙泉窑舟形砚滴', file: '龙泉窑舟形砚滴.glb' },
                { name: '青釉小瓷马', file: '青釉小瓷马.glb' },
                { name: '龙泉窑青釉鸡首壶', file: '鸡首壶.glb' },
                { name: '青釉双鱼耳瓶', file: '青釉双鱼耳瓶.glb' },
                { name: '元代高足杯', file: '元代高足杯.glb' },
                { name: '南宋青釉香炉', file: '南宋青釉香炉.glb' }
            ];

            models = targets.map((t, i) => ({
                id: i, name: t.name, file: t.file, group: null, loaded: false, desc: artifactDescriptions[t.name]
            }));

            renderModelList();

            models.forEach((m, i) => {
                gltfLoader.load(m.file, (gltf) => {
                    m.group = gltf.scene;
                    m.loaded = true;
                    renderModelList();
                }, undefined, (err) => console.error(m.name + " 加载失败"));
            });
        }

        function renderModelList() {
            const list = document.getElementById('model-list');
            list.innerHTML = '';
            models.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white/5 rounded-xl flex justify-between items-center ui-interact mb-2 cursor-pointer hover:bg-white/10 transition-all";
                div.innerHTML = `<span class="text-[10px] tracking-widest text-white/70">${m.name}</span>
                                 <span class="text-[8px] text-cyan-400">${m.loaded ? 'READY' : '...'}</span>`;
                div.onclick = () => { if(m.loaded) reconstructModel(i); };
                list.appendChild(div);
            });
        }

        function reconstructModel(index) {
            const m = models[index];
            if (!m || !m.group) return;
            activeModelIndex = index;
            document.getElementById('asset-name').innerText = m.name;
            document.getElementById('panel-title').innerText = m.name;
            document.getElementById('panel-desc').innerText = m.desc;
            document.getElementById('info-panel').classList.remove('opacity-0', 'translate-x-10');

            const pts = [];
            m.group.traverse(c => {
                if(c.isMesh) {
                    const pos = c.geometry.attributes.position;
                    for(let i=0; i<pos.count; i++) {
                        let v = new THREE.Vector3().fromBufferAttribute(pos, i);
                        v.applyMatrix4(c.matrixWorld);
                        pts.push(v);
                    }
                }
            });

            const box = new THREE.Box3().setFromObject(m.group);
            const center = box.getCenter(new THREE.Vector3());
            const scale = 50 / Math.max(box.getSize(new THREE.Vector3()).x, box.getSize(new THREE.Vector3()).y);

            for(let i=0; i<config.count; i++) {
                const i3 = i * 3;
                if(i < config.count * 0.9) {
                    const p = pts[Math.floor(Math.random() * pts.length)];
                    targetPositions[i3] = (p.x - center.x) * scale;
                    targetPositions[i3+1] = (p.y - center.y) * scale;
                    targetPositions[i3+2] = (p.z - center.z) * scale;
                    targetColors[i3] = 0.4; targetColors[i3+1] = 0.8; targetColors[i3+2] = 0.7;
                } else {
                    const r = 100 + Math.random() * 20;
                    const a = Math.random() * Math.PI * 2;
                    targetPositions[i3] = Math.cos(a) * r;
                    targetPositions[i3+1] = (Math.random()-0.5) * 100;
                    targetPositions[i3+2] = Math.sin(a) * r;
                    targetColors[i3] = 0.1; targetColors[i3+1] = 0.2; targetColors[i3+2] = 0.3;
                }
            }
            toggleSidebar(false);
        }

        function setNebulaMode() {
            for(let i=0; i<config.count; i++) {
                const i3 = i * 3;
                const r = 50 + Math.random() * 50;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                targetPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
                targetPositions[i3+1] = r * Math.sin(phi) * Math.sin(theta);
                targetPositions[i3+2] = r * Math.cos(phi);
                targetColors[i3] = 0.2; targetColors[i3+1] = 0.4; targetColors[i3+2] = 0.5;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            currentRotationY += 0.002;
            points.rotation.y = currentRotationY;

            const p = points.geometry.attributes.position.array;
            const c = points.geometry.attributes.color.array;
            for(let i=0; i<config.count; i++) {
                const i3 = i*3;
                p[i3] += (targetPositions[i3] - p[i3]) * 0.05;
                p[i3+1] += (targetPositions[i3+1] - p[i3+1]) * 0.05;
                p[i3+2] += (targetPositions[i3+2] - p[i3+2]) * 0.05;
                c[i3] += (targetColors[i3] - c[i3]) * 0.02;
                c[i3+1] += (targetColors[i3+1] - c[i3+1]) * 0.02;
                c[i3+2] += (targetColors[i3+2] - c[i3+2]) * 0.02;
            }
            points.geometry.attributes.position.needsUpdate = true;
            points.geometry.attributes.color.needsUpdate = true;
            renderer.render(scene, camera);
        }

        function initVision() {
            const video = document.getElementById('input_video');
            const hands = new Hands({ locateFile: (file) => `https://unpkg.com/@mediapipe/hands/${file}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });
            
            hands.onResults((res) => {
                const dot = document.getElementById('vision-dot');
                const label = document.getElementById('gesture-name');
                const okBar = document.getElementById('ok-bar');

                if(res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                    dot.className = "w-2 h-2 rounded-full bg-cyan-400";
                    label.innerText = "手势交互中";
                    const lm = res.multiHandLandmarks[0];
                    const d = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
                    const isOK = d < 0.05 && lm[12].y < lm[10].y;
                    
                    if(isOK) {
                        if(!okGestureStartTime) okGestureStartTime = Date.now();
                        const p = Math.min(100, ((Date.now() - okGestureStartTime) / 1500) * 100);
                        okBar.style.width = p + "%";
                        if(p >= 100) {
                            reconstructModel((activeModelIndex + 1) % models.length);
                            okGestureStartTime = null;
                        }
                    } else {
                        okGestureStartTime = null; okBar.style.width = "0%";
                    }
                } else {
                    dot.className = "w-2 h-2 rounded-full bg-red-600";
                    label.innerText = "等待输入...";
                }
            });

            const cam = new Camera(video, { onFrame: async () => await hands.send({image: video}), width: 320, height: 240 });
            cam.start();
        }

        function toggleSidebar(s) { document.getElementById('sidebar').style.transform = s ? 'translateX(0)' : 'translateX(-100%)'; }
        function handleFirstInteraction() { if(!audioStarted) { document.getElementById('bgm').play().catch(()=>{}); audioStarted = true; } }
        window.onload = () => { initApp(); initVision(); };
    </script>
</body>
</html>
