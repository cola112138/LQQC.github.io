<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙泉青瓷数字遗产交互系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
        body { margin: 0; background: #000406; color: white; overflow: hidden; font-family: 'Inter', sans-serif; cursor: crosshair; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .ui-overlay { pointer-events: none; }
        .ui-interact { pointer-events: auto; }
        .glass-panel { background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scanline { background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,255,204,0.02) 50%); background-size: 100% 4px; }
        .custom-loader { border: 2px solid rgba(0,255,204,0.1); border-top: 2px solid #00ffcc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #sidebar { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .draggable-item { cursor: grab; transition: all 0.3s ease; }
        .draggable-item:active { cursor: grabbing; }
        .draggable-item.dragging { opacity: 0.4; transform: scale(0.95); background: rgba(0, 255, 204, 0.1); }
        .drag-over { border-top: 2px solid #00ffcc !important; }

        .ok-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: #00ffcc; width: 0%; transition: width 0.1s linear; box-shadow: 0 0 10px #00ffcc; }
        .circular-progress { position: absolute; bottom: 10px; left: 10px; width: 40px; height: 40px; transform: rotate(-90deg); filter: drop-shadow(0 0 5px #00ffcc); }
        .circular-progress circle { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }
        .bg-circle { stroke: rgba(255,255,255,0.1); }
        .fg-circle { stroke: #00ffcc; stroke-dasharray: 100; stroke-dashoffset: 100; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,255,204,0.2); border-radius: 10px; }
    </style>
</head>
<body onclick="handleFirstInteraction()">
    <audio id="bgm" loop preload="auto">
        <source src="https://cdn.jsdelivr.net/gh/cola112138/LQQC.github.io@main/Among%20the%20Stars.mp3" type="audio/mpeg">
    </audio>

    <div id="canvas-container" class="fixed inset-0 z-0"></div>
    <div class="fixed inset-0 pointer-events-none scanline z-10 opacity-30"></div>

    <div class="ui-overlay fixed inset-0 z-20 p-12 flex flex-col justify-between">
        <header class="flex justify-between items-start">
            <div>
                <div class="w-12 h-0.5 bg-yellow-500 mb-4"></div>
                <h1 class="text-3xl font-extralight tracking-[0.5em] mb-2 uppercase">LONGQUANQC</h1>
                <h2 class="text-lg font-light tracking-[0.2em] text-white/40">窑火炼千载，一色出天青。</h2>
            </div>
            <button onclick="toggleFullScreen()" class="ui-interact glass-panel p-3 rounded-full hover:bg-white/10 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                </svg>
            </button>
        </header>

        <footer class="flex justify-between items-end">
            <div class="space-y-4">
                <div class="glass-panel p-4 rounded-2xl w-48 flex items-center gap-4 border-l-2 border-l-cyan-500 relative overflow-hidden">
                    <div id="vision-dot" class="w-2 h-2 rounded-full bg-red-600"></div>
                    <div>
                        <div class="text-[8px] tracking-widest text-white/40 uppercase mb-1">Hand Tracking</div>
                        <div id="gesture-name" class="text-xs font-medium text-cyan-400">等待输入...</div>
                    </div>
                    <div id="ok-bar" class="ok-progress"></div>
                </div>
            </div>
            <div class="text-right flex flex-col items-end">
                <div class="text-[8px] text-white/20 tracking-[0.3em] uppercase mb-1">Current Artifact</div>
                <div id="asset-name" class="text-sm font-light tracking-[0.2em] text-white/80">星云待机模式</div>
            </div>
        </footer>
    </div>

    <button onclick="toggleSidebar(true)" class="ui-interact fixed left-6 top-1/2 -translate-y-1/2 z-40 p-5 rounded-full group">
        <div class="flex flex-col gap-2">
            <div class="w-1.5 h-1.5 rounded-full bg-[#7da1a1] group-hover:bg-cyan-400 transition-colors"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-[#7da1a1] group-hover:bg-cyan-400 transition-colors"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-[#7da1a1] group-hover:bg-cyan-400 transition-colors"></div>
        </div>
    </button>

    <div id="sidebar" class="fixed left-0 top-0 h-full w-80 glass-panel border-r border-white/10 z-50 -translate-x-full flex flex-col">
        <div class="p-10 flex flex-col h-full">
            <div class="flex justify-between items-center mb-10">
                <div class="flex flex-col">
                    <span class="text-xs tracking-[0.4em] text-white/60 uppercase">Archives / 档案库</span>
                    <span class="text-[8px] text-cyan-400/50 mt-1 uppercase tracking-tighter">长按可上下拖动调整顺序</span>
                </div>
                <button onclick="toggleSidebar(false)" class="ui-interact text-[10px] text-cyan-400 uppercase">Close</button>
            </div>
            <div id="model-list" class="ui-interact flex-1 overflow-y-auto space-y-3 pr-2"></div>
            <div class="mt-8 ui-interact">
                <label class="block p-5 border border-dashed border-white/20 rounded-2xl text-center cursor-pointer hover:border-cyan-400 transition-all group">
                    <span class="text-[9px] text-white/40 group-hover:text-cyan-400 tracking-widest uppercase">+ 导入本地 OBJ</span>
                    <input type="file" multiple accept=".obj" class="hidden" onchange="handleFileUpload(event)">
                </label>
            </div>
        </div>
    </div>

    <div id="info-panel" class="fixed right-12 top-1/2 -translate-y-1/2 w-96 glass-panel p-10 rounded-[2.5rem] opacity-0 transition-all duration-700 translate-x-12 z-30">
        <div class="text-[8px] text-yellow-500 tracking-[0.5em] mb-6 uppercase">Asset Record</div>
        <h3 id="panel-title" class="text-2xl font-light mb-6 border-b border-white/10 pb-6 tracking-wide">星云状态</h3>
        <div id="panel-desc" class="text-xs leading-relaxed text-white/60 font-light text-justify italic">系统处于静默待机状态...</div>
    </div>

    <div class="fixed bottom-12 left-12 w-52 h-36 glass-panel rounded-3xl overflow-hidden z-40">
        <video id="input_video" class="absolute inset-0 w-full h-full object-cover opacity-30 grayscale" playsinline></video>
        <canvas id="output_canvas" class="absolute inset-0 w-full h-full"></canvas>
        <svg class="circular-progress" viewBox="0 0 36 36">
            <circle class="bg-circle" cx="18" cy="18" r="16"></circle>
            <circle id="ok-circle" class="fg-circle" cx="18" cy="18" r="16"></circle>
        </svg>
        <div id="loading-overlay" class="absolute inset-0 flex items-center justify-center bg-black/40">
            <div class="custom-loader"></div>
        </div>
    </div>

    <script>
        const config = { count: 200000, colors: { dark: 0x000406 } };
        let scene, camera, renderer, composer, points;
        let targetPositions = new Float32Array(config.count * 3);
        let targetColors = new Float32Array(config.count * 3);
        let targetSizes = new Float32Array(config.count);
        let currentRotationY = 0, lerpScale = 1.0, targetScale = 1.0;
        let isDragging = false, lastMouseX = 0, models = [], activeModelIndex = -1;
        let okGestureStartTime = null, basePinchDist = null, baseScale = 1.0, audioStarted = false;

        const artifactDescriptions = {
            '龙泉窑舟形砚滴': '浙江省博物馆的镇馆之宝。整器巧妙化作一叶扁舟，舟上人物神态生动。釉质紧致，色泽淡雅。作为盛水注墨之器，它不仅体现了宋元时期陶瓷工艺的精湛，更承载了古代士大夫阶层的审美风骨。',
            '青釉小瓷马': '这件瓷马形态健硕，四足有力，将马的昂扬姿态表现得淋漓尽致。釉色清亮，完美贴合雕塑线条。它虽体积微小，却展现了龙泉窑工匠在微型造像上的卓越功底，是难得一见的动物题材杰作。',
            '龙泉窑青釉鸡首壶': '此壶集实用与审美于一体，鸡首昂扬，象征着黎明与吉祥。釉色呈现典型的梅子青感，温润莹泽。其造型流线流畅，展现了龙泉窑早期对自然形态的精妙捕捉与釉料烧制的极高水准。',
            '青釉双鱼耳瓶': '瓶侧双鱼形耳栩栩如生，寓意“年年有余”。釉面清亮剔透，色泽青翠欲滴。器型比例匀称，瓶颈修长，鱼耳的点缀打破了器物的沉静，增添了一抹灵动之气，是龙泉青瓷中的经典制式。',
            '元代高足杯': '杯体挺拔，杯脚纤细稳重。釉色均匀，色调稳重。作为元代流行的酒具，它融合了游牧文化的豪放与江南瓷文化的精致。杯口微撇，触感细腻，反映了元代龙泉窑远销海内外的繁荣景象。',
            '南宋青釉香炉': '此炉造型端庄肃穆，模仿青铜礼器。釉面肥厚，开片错落有致，色泽如碧玉般深沉。烟雾从炉中袅袅升起，与青翠的釉色相得益彰，是南宋龙泉窑追求“绚烂之极归于平淡”审美理想的巅峰之作。'
        };

        function handleFirstInteraction() {
            if (!audioStarted) {
                const bgm = document.getElementById('bgm');
                bgm.play().then(() => { audioStarted = true; }).catch(() => {});
            }
        }

        function initApp() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(config.colors.dark);
            camera = new THREE.PerspectiveCamera(25, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 180;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.5, 0.8));

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(config.count * 3), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(config.count * 3), 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(new Float32Array(config.count), 1));

            points = new THREE.Points(geometry, new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uRotation: { value: 0 }, uScale: { value: 1.0 } },
                vertexShader: `
                    attribute float size; attribute vec3 color; varying vec3 vColor;
                    uniform float uTime; uniform float uRotation; uniform float uScale;
                    void main() {
                        vColor = color; vec3 pos = position * uScale;
                        float s = sin(uRotation); float c = cos(uRotation);
                        mat2 rot = mat2(c, -s, s, c); pos.xz = rot * pos.xz;
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * (2000.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float d = distance(gl_PointCoord, vec2(0.5));
                        if (d > 0.5) discard;
                        gl_FragColor = vec4(vColor, (1.0 - d * 2.0) * 0.8);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            }));
            scene.add(points);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
            });
            
            window.addEventListener('mousedown', (e) => { if(e.button === 0) { isDragging = true; lastMouseX = e.clientX; } });
            window.addEventListener('mousemove', (e) => { if (isDragging) { currentRotationY += (e.clientX - lastMouseX) * 0.005; lastMouseX = e.clientX; } });
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('wheel', (e) => { targetScale = Math.max(0.3, Math.min(3.0, targetScale - e.deltaY * 0.001)); });
            
            animate();
            setNebulaMode();
            loadFixedArchives();
        }

        // 核心：按照用户指定的新顺序加载
        function loadFixedArchives() {
            const gltfLoader = new THREE.GLTFLoader();
            const targets = [
                { name: '龙泉窑舟形砚滴', url: 'https://cdn.jsdelivr.net/gh/cola112138/LQQC.github.io@main/%E9%BE%99%E6%B3%89%E7%AA%91%E8%88%9F%E5%BD%A2%E7%A0%9A%E6%BB%B4.glb' },
                { name: '青釉小瓷马', url: 'https://cdn.jsdelivr.net/gh/cola112138/LQQC.github.io@main/%E9%9D%92%E9%87%89%E5%B0%8F%E7%93%B7%E9%A9%AC.glb' },
                { name: '龙泉窑青釉鸡首壶', url: 'https://cdn.jsdelivr.net/gh/cola112138/LQQC.github.io@main/%E9%B8%A1%E9%A6%96%E5%A3%B6.glb' },
                { name: '青釉双鱼耳瓶', url: 'https://cdn.jsdelivr.net/gh/cola112138/LQQC.github.io@main/%E9%9D%92%E9%87%89%E5%8F%8C%E9%B1%BC%E8%80%B3%E7%93%B6.glb' },
                { name: '元代高足杯', url: 'https://cdn.jsdelivr.net/gh/cola112138/LQQC.github.io@main/%E5%85%83%E4%BB%A3%E9%AB%98%E8%B6%B3%E6%9D%AF.glb' },
                { name: '南宋青釉香炉', url: 'https://cdn.jsdelivr.net/gh/cola112138/LQQC.github.io@main/%E5%8D%97%E5%AE%8B%E9%9D%92%E9%87%89%E9%A6%99%E7%82%89.glb' }
            ];

            let loadedCounter = 0;
            // 预填充占位，确保顺序
            const tempModels = new Array(targets.length);

            targets.forEach((item, idx) => {
                gltfLoader.load(item.url, (gltf) => {
                    const group = gltf.scene;
                    group.rotation.x = 0; 
                    group.updateMatrixWorld(true);
                    tempModels[idx] = { id: `fixed_${idx}`, name: item.name, group: group, desc: artifactDescriptions[item.name] };
                    loadedCounter++;
                    if(loadedCounter === targets.length) {
                        models = tempModels.filter(m => m !== undefined);
                        renderModelList();
                    }
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isDragging) currentRotationY += 0.0012;
            lerpScale += (targetScale - lerpScale) * 0.1;
            points.material.uniforms.uTime.value = performance.now() * 0.001;
            points.material.uniforms.uRotation.value = currentRotationY;
            points.material.uniforms.uScale.value = lerpScale;
            const pos = points.geometry.attributes.position.array;
            const col = points.geometry.attributes.color.array;
            const siz = points.geometry.attributes.size.array;
            for (let i = 0; i < config.count; i++) {
                const i3 = i * 3;
                pos[i3] += (targetPositions[i3] - pos[i3]) * 0.06;
                pos[i3+1] += (targetPositions[i3+1] - pos[i3+1]) * 0.06;
                pos[i3+2] += (targetPositions[i3+2] - pos[i3+2]) * 0.06;
                col[i3] += (targetColors[i3] - col[i3]) * 0.04;
                col[i3+1] += (targetColors[i3+1] - col[i3+1]) * 0.04;
                col[i3+2] += (targetColors[i3+2] - col[i3+2]) * 0.04;
                siz[i] += (targetSizes[i] - siz[i]) * 0.06;
            }
            points.geometry.attributes.position.needsUpdate = true;
            points.geometry.attributes.color.needsUpdate = true;
            points.geometry.attributes.size.needsUpdate = true;
            composer.render();
        }

        function setNebulaMode() {
            document.getElementById('asset-name').innerText = "星云待机模式";
            activeModelIndex = -1;
            for (let i = 0; i < config.count; i++) {
                const i3 = i * 3, r = 50 + Math.random() * 100, theta = Math.random() * Math.PI * 2, phi = Math.acos((Math.random() * 2) - 1);
                targetPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
                targetPositions[i3+1] = r * Math.sin(phi) * Math.sin(theta);
                targetPositions[i3+2] = r * Math.cos(phi);
                const isGold = Math.random() > 0.7;
                targetColors[i3] = isGold ? 1.0 : 0.35; targetColors[i3+1] = isGold ? 0.85 : 0.75; targetColors[i3+2] = isGold ? 0.1 : 0.75; 
                targetSizes[i] = Math.random() < 0.05 ? 0.35 : 0.08;
            }
            document.getElementById('info-panel').classList.add('opacity-0');
        }

        function reconstructModel(index) {
            const modelData = models[index];
            if (!modelData) return;
            activeModelIndex = index;
            document.getElementById('asset-name').innerText = modelData.name;
            const panel = document.getElementById('info-panel');
            document.getElementById('panel-title').innerText = modelData.name;
            document.getElementById('panel-desc').innerText = modelData.desc || "数字资产描述...";
            panel.classList.remove('opacity-0', 'translate-x-12');

            const samplerPoints = [];
            modelData.group.traverse(child => {
                if (child.isMesh) {
                    const posAttr = child.geometry.attributes.position;
                    for (let i = 0; i < posAttr.count; i++) {
                        const v = new THREE.Vector3().fromBufferAttribute(posAttr, i);
                        v.applyMatrix4(child.matrixWorld);
                        samplerPoints.push(v);
                    }
                }
            });
            const box = new THREE.Box3().setFromObject(modelData.group);
            const center = box.getCenter(new THREE.Vector3()), size = box.getSize(new THREE.Vector3());
            const scale = 55 / Math.max(size.x, size.y, size.z);
            for (let i = 0; i < config.count; i++) {
                const i3 = i * 3;
                if(i < config.count * 0.9) {
                    const p = samplerPoints[Math.floor(Math.random() * samplerPoints.length)];
                    targetPositions[i3] = (p.x - center.x) * scale; targetPositions[i3+1] = (p.y - center.y) * scale; targetPositions[i3+2] = (p.z - center.z) * scale;
                    const isGold = Math.random() > 0.7;
                    targetColors[i3] = isGold ? 1.0 : 0.35; targetColors[i3+1] = isGold ? 0.85 : 0.75; targetColors[i3+2] = isGold ? 0.1 : 0.75;
                    targetSizes[i] = Math.random() > 0.95 ? 0.25 : 0.05;
                } else {
                    const r = 100 + Math.random() * 150, theta = Math.random() * Math.PI * 2;
                    targetPositions[i3] = r * Math.cos(theta); targetPositions[i3+1] = (Math.random() - 0.5) * 300; targetPositions[i3+2] = r * Math.sin(theta);
                    targetColors[i3] = 0.15; targetColors[i3+1] = 0.35; targetColors[i3+2] = 0.40; targetSizes[i] = 0.06;
                }
            }
            toggleSidebar(false);
        }

        function renderModelList() {
            const list = document.getElementById('model-list');
            list.innerHTML = '';
            models.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = "draggable-item p-4 bg-white/5 border border-white/5 rounded-2xl flex justify-between items-center group ui-interact";
                div.setAttribute('draggable', 'true');
                div.dataset.index = i;
                div.innerHTML = `
                    <div class="flex items-center gap-3 pointer-events-none">
                        <div class="flex flex-col gap-0.5 opacity-20"><div class="w-3 h-0.5 bg-white"></div><div class="w-3 h-0.5 bg-white"></div></div>
                        <span class="text-[10px] text-white/50 group-hover:text-white uppercase tracking-widest">${m.name}</span>
                    </div>
                    <button class="text-[8px] text-white/10 group-hover:text-cyan-400 border border-white/5 px-2 py-1 rounded-lg">LOAD</button>
                `;
                div.addEventListener('click', (e) => { reconstructModel(i); });
                div.addEventListener('dragstart', (e) => { div.classList.add('dragging'); e.dataTransfer.setData('text/plain', i); });
                div.addEventListener('dragend', () => { div.classList.remove('dragging'); document.querySelectorAll('.draggable-item').forEach(el => el.classList.remove('drag-over')); });
                div.addEventListener('dragover', (e) => { e.preventDefault(); div.classList.add('drag-over'); });
                div.addEventListener('dragleave', () => { div.classList.remove('drag-over'); });
                div.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    const toIndex = parseInt(div.dataset.index);
                    if (fromIndex !== toIndex) {
                        const movedItem = models.splice(fromIndex, 1)[0];
                        models.splice(toIndex, 0, movedItem);
                        renderModelList();
                    }
                });
                list.appendChild(div);
            });
        }

        window.toggleSidebar = (show) => { document.getElementById('sidebar').style.transform = show ? 'translateX(0)' : 'translateX(-100%)'; handleFirstInteraction(); };
        window.toggleFullScreen = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
        window.handleFileUpload = (e) => {
            const loader = new THREE.OBJLoader();
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const group = loader.parse(ev.target.result); group.rotation.x = 0;
                    models.push({ id: Date.now()+Math.random(), name: file.name.replace('.obj',''), group: group, desc: "用户导入的数字资产。" });
                    renderModelList();
                };
                reader.readAsText(file);
            });
        };

        function initVision() {
            const videoElement = document.getElementById('input_video'), canvasElement = document.getElementById('output_canvas'), canvasCtx = canvasElement.getContext('2d');
            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
            hands.onResults((results) => {
                document.getElementById('loading-overlay').classList.add('hidden');
                canvasCtx.save(); canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                const okBar = document.getElementById('ok-bar'), okCircle = document.getElementById('ok-circle'), visionDot = document.getElementById('vision-dot'), gestureLabel = document.getElementById('gesture-name');
                if (results.multiHandLandmarks?.length > 0) {
                    visionDot.className = "w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_10px_#00ffcc]";
                    const lm = results.multiHandLandmarks[0];
                    drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: '#00FFFF', lineWidth: 2});
                    drawLandmarks(canvasCtx, lm, {color: '#FFD700', lineWidth: 1, radius: 2}); 
                    const dist = (p1, p2) => Math.hypot(lm[p1].x - lm[p2].x, lm[p1].y - lm[p2].y);
                    const pinchDist = dist(4, 8), palmSize = dist(0, 5);
                    if (lm[12].y < lm[9].y && pinchDist > palmSize * 0.8) {
                        if (basePinchDist === null) { basePinchDist = pinchDist; baseScale = targetScale; }
                        targetScale = Math.max(0.3, Math.min(3.0, baseScale * (pinchDist / basePinchDist)));
                        gestureLabel.innerText = "平滑缩放中...";
                    } else { basePinchDist = null; }
                    const isOK = dist(4, 8) < 0.06 && lm[12].y < lm[10].y;
                    if (isOK) {
                        if (!okGestureStartTime) okGestureStartTime = Date.now();
                        const progress = Math.min(100, ((Date.now() - okGestureStartTime) / 1500) * 100);
                        okBar.style.width = progress + "%"; okCircle.style.strokeDashoffset = 100 - progress;
                        if (progress >= 100) { if(models.length > 0) reconstructModel((activeModelIndex + 1) % models.length); okGestureStartTime = null; }
                    } else { okGestureStartTime = null; okBar.style.width = "0%"; okCircle.style.strokeDashoffset = 100; if (!basePinchDist) gestureLabel.innerText = "手势交互中"; }
                    currentRotationY += (lm[0].x - 0.5) * 0.1;
                } else { visionDot.className = "w-2 h-2 rounded-full bg-red-600"; gestureLabel.innerText = "等待输入..."; okGestureStartTime = null; basePinchDist = null; }
                canvasCtx.restore();
            });
            new Camera(videoElement, { onFrame: async () => { canvasElement.width = videoElement.videoWidth; canvasElement.height = videoElement.videoHeight; await hands.send({image: videoElement}); }, width: 320, height: 240 }).start();
        }
        window.onload = () => { initApp(); initVision(); };
    </script>
</body>
</html>
